<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Date & Time — NightOut Annapolis</title>
    <style>
        :root {
            --bg-color: #fbfbf9;
            --card-bg: #ffffff;
            --primary: #0b172a;
            --accent: #d4af37;
            --text-main: #0b172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

        body { background-color: var(--bg-color); color: var(--primary); display: flex; flex-direction: column; min-height: 100vh; }

        header { background: #0b172a; border-bottom: 1px solid rgba(255,255,255,0.1); padding: 18px 24px; text-align: center; }
        .logo { font-size: 22px; font-weight: 900; color: #ffffff; text-decoration: none; }
        .logo span { color: var(--accent); }

        main { flex: 1; max-width: 620px; width: 100%; margin: 36px auto; padding: 0 20px; }

        .card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 20px; padding: 36px 32px; box-shadow: 0 10px 30px rgba(11, 23, 42, 0.04); }
        h2 { font-size: 24px; font-weight: 900; text-align: center; margin-bottom: 6px; letter-spacing: -0.5px; }
        p { color: var(--text-muted); font-size: 14px; text-align: center; margin-bottom: 32px; }
        
        .date-group { border: 1px solid var(--border-color); border-radius: 16px; padding: 22px; margin-bottom: 24px; background: #ffffff; }
        .date-title { font-size: 17px; font-weight: 800; color: var(--primary); margin-bottom: 14px; letter-spacing: -0.3px; }
        
        .time-slots-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
        .time-slot { border: 1px dashed var(--border-color); border-radius: 12px; padding: 16px 12px; text-align: center; background: #ffffff; }
        .time-slot.available { border: 1.5px solid var(--primary); cursor: pointer; transition: all 0.2s ease; }
        .time-slot.available:hover { background: var(--primary); color: #ffffff; transform: translateY(-2px); box-shadow: 0 6px 16px rgba(11, 23, 42, 0.12); }
        .time-slot.available:hover .time-sub { color: #cbd5e1; }
        .time-slot.soldout { background: #fbfbf9; border: 1px solid #e2e8f0; color: #94a3b8; cursor: not-allowed; opacity: 0.7; }
        
        .time-text { font-size: 15px; font-weight: 800; }
        .time-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; font-weight: 600; }
        .soldout-badge { display: inline-block; background: #e2e8f0; color: #64748b; font-size: 10px; font-weight: 800; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; margin-top: 6px; }
        footer { text-align: center; padding: 24px; font-size: 12px; color: var(--text-muted); }
    </style>
</head>
<body>

    <header>
        <a href="/" class="logo">NightOut<span>Annapolis</span></a>
    </header>

    <main>
        <div class="card">
            <h2>Select Date & Start Time</h2>
            <p>All reservations and activity passes are curated around your start time.</p>

            <div id="loadingText" style="text-align: center; padding: 20px; color: var(--text-muted); font-size: 14px;">Loading live availability...</div>
            <div id="datesContainer"></div>

            <a href="/" style="display: block; text-align: center; margin-top: 24px; color: var(--text-muted); font-size: 13px; font-weight: 600; text-decoration: none;">← Back to Overview</a>
        </div>
    </main>

    <footer>&copy; 2026 NightOut Annapolis. Made by locals.</footer>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzK5qTseJuvbgz7uOT056mxcE2o-JESYaNkLnEhcASWbCfFkzxJ-SFBcqgxnPk8jW7-/exec";

        function formatCleanTime(timeStr) {
            if (!timeStr) return "";
            var str = timeStr.toString().trim();
            if (str.includes("GMT") || str.includes("T")) {
                var d = new Date(str);
                if (!isNaN(d.getTime())) {
                    return d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit', hour12: true });
                }
            }
            var parts = str.split(":");
            if (parts.length >= 2) {
                var hrs = parseInt(parts[0], 10);
                var mins = parts[1];
                var ampm = hrs >= 12 ? 'PM' : 'AM';
                hrs = hrs % 12;
                hrs = hrs ? hrs : 12;
                return hrs + ":" + mins + " " + ampm;
            }
            return str;
        }

        function formatCleanDate(dateStr) {
            if (!dateStr) return "";
            var str = dateStr.toString().trim();
            if (str.includes("GMT") || str.includes("T")) {
                var d = new Date(str);
                if (!isNaN(d.getTime())) {
                    return d.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
                }
            }
            return str;
        }

        window.addEventListener('DOMContentLoaded', () => {
            fetch(GOOGLE_SCRIPT_URL + "?action=getDates")
            .then(res => res.json())
            .then(data => {
                document.getElementById('loadingText').style.display = 'none';
                const container = document.getElementById('datesContainer');
                container.innerHTML = "";

                if (!data || data.length === 0) {
                    container.innerHTML = "<div style='text-align:center; color:#64748b;'>No available dates listed right now. Check back soon!</div>";
                    return;
                }

                const grouped = {};
                data.forEach(item => {
                    var cleanD = formatCleanDate(item.date);
                    if (!grouped[cleanD]) grouped[cleanD] = [];
                    
                    item.cleanStart = formatCleanTime(item.startTime);
                    item.cleanFinish = formatCleanTime(item.finishTime);
                    item.slotKey = cleanD + " (" + item.cleanStart + " - " + item.cleanFinish + ")";
                    
                    grouped[cleanD].push(item);
                });

                Object.keys(grouped).forEach(dateStr => {
                    const groupDiv = document.createElement('div');
                    groupDiv.className = "date-group";
                    
                    let slotsHtml = `<div class="date-title">${dateStr}</div><div class="time-slots-grid">`;
                    
                    grouped[dateStr].forEach(item => {
                        const isAvailable = item.quantity > 0;
                        const timeDisplay = item.cleanStart + (item.cleanFinish ? " - " + item.cleanFinish : "");
                        
                        if (isAvailable) {
                            slotsHtml += `
                                <div class="time-slot available" onclick="bookTimeSlot('${item.slotKey}', '${item.stripeLink}')">
                                    <div class="time-text">${timeDisplay}</div>
                                    <div class="time-sub">${item.quantity} ${item.quantity === 1 ? 'Slot' : 'Slots'} Left ($${item.price})</div>
                                </div>
                            `;
                        } else {
                            slotsHtml += `
                                <div class="time-slot soldout">
                                    <div class="time-text">${timeDisplay}</div>
                                    <div class="soldout-badge">Sold Out</div>
                                </div>
                            `;
                        }
                    });

                    slotsHtml += `</div>`;
                    groupDiv.innerHTML = slotsHtml;
                    container.appendChild(groupDiv);
                });
            })
            .catch(err => {
                console.error(err);
                document.getElementById('loadingText').textContent = "Unable to load dates. Please refresh.";
            });
        });

        function bookTimeSlot(slotKey, stripeUrl) {
            localStorage.setItem('chosenDate', slotKey);
            window.location.href = stripeUrl;
        }
    </script>
</body>
</html>
