<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Preferences — NightOut Annapolis</title>
    
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>

    <header>
        <a href="/" class="logo">NightOut<span>Annapolis</span></a>
    </header>

    <main>
        <div class="card" style="text-align: center;">
            <h1>Payment Confirmed!</h1>
            <p>Tell us your preferences so our concierge team can curate your custom itinerary.</p>

            <div id="dateDisplay" class="selected-date-badge">Scheduled Slot: Loading...</div>

            <form id="preferencesForm">
                <div class="form-group">
                    <label for="names">1) First & Last Names (Both Guests):</label>
                    <input type="text" id="names" placeholder="e.g. John Smith & Jane Doe" required>
                </div>
                <div class="form-group">
                    <label for="phone">2) Cell Phone Number:</label>
                    <input type="tel" id="phone" placeholder="e.g. (410) 555-0199" required>
                </div>
                <div class="form-group">
                    <label for="email">3) Email Address:</label>
                    <input type="email" id="email" placeholder="e.g. john@example.com" required>
                </div>
                <div class="form-group">
                    <label for="diet">4) Dietary Restrictions / Food Allergies:</label>
                    <input type="text" id="diet" placeholder="e.g. None, Vegetarian, Shellfish Allergy" required>
                </div>
                <div class="form-group">
                    <label for="vibe">5) Preferred Atmosphere:</label>
                    <select id="vibe" required>
                        <option value="" disabled selected>Select a vibe...</option>
                        <option value="Waterfront & Seafood">Waterfront & Fresh Seafood</option>
                        <option value="Cozy & Intimate Wine Bar">Cozy & Intimate Wine Bar</option>
                        <option value="Hidden Underground Gastropub">Hidden Underground Gastropub</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="priceTier">6) Target Dinner Spending Range:</label>
                    <select id="priceTier" required>
                        <option value="" disabled selected>Select target price...</option>
                        <option value="$ ($15-25 per person)">$ — Budget Friendly</option>
                        <option value="$$ ($25-40 per person)">$$ — Moderate / Standard</option>
                        <option value="$$$ ($40-65 per person)">$$$ — Upscale Dining</option>
                    </select>
                </div>

                <button type="submit" class="btn" style="width: 100%;">Lock In Preferences & Open Portal</button>
            </form>
        </div>
    </main>

    <footer>&copy; 2026 NightOut Annapolis. Made by locals.</footer>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzK5qTseJuvbgz7uOT056mxcE2o-JESYaNkLnEhcASWbCfFkzxJ-SFBcqgxnPk8jW7-/exec";

        window.addEventListener('DOMContentLoaded', () => {
            const savedSlot = localStorage.getItem('chosenDate');
            const badge = document.getElementById('dateDisplay');
            if (savedSlot) {
                badge.textContent = "Scheduled Slot: " + savedSlot;
            } else {
                badge.textContent = "Scheduled Slot: Date Confirmed";
            }
        });

        document.getElementById('preferencesForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const submitBtn = e.target.querySelector('button');
            submitBtn.textContent = "Saving & Generating Passcode...";
            submitBtn.disabled = true;

            const payload = {
                date: localStorage.getItem('chosenDate') || "Confirmed Date Slot",
                names: document.getElementById('names').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value,
                diet: document.getElementById('diet').value,
                vibe: document.getElementById('vibe').value,
                priceTier: document.getElementById('priceTier').value
            };

            fetch(GOOGLE_SCRIPT_URL, {
                method: "POST", mode: "cors",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                if (data.trackingCode) {
                    window.location.href = "/tracker/?code=" + encodeURIComponent(data.trackingCode);
                } else {
                    window.location.href = "/tracker/";
                }
            })
            .catch(err => {
                console.error(err);
                window.location.href = "/tracker/";
            });
        });
    </script>
</body>
</html>
