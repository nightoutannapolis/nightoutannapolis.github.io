<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Date Night Hop — NightOut Annapolis</title>
    <style>
        :root {
            --bg-color: #fbfbf9;
            --card-bg: #ffffff;
            --primary: #0b172a;
            --accent: #d4af37;
            --accent-soft: #fdf8e6;
            --text-main: #0b172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

        body { background-color: var(--bg-color); color: var(--text-main); display: flex; flex-direction: column; min-height: 100vh; line-height: 1.6; }

        header { background: #0b172a; border-bottom: 1px solid rgba(255,255,255,0.1); padding: 18px 24px; text-align: center; }
        .logo { font-size: 22px; font-weight: 900; color: #ffffff; text-decoration: none; letter-spacing: -0.5px; }
        .logo span { color: var(--accent); }

        main { flex: 1; max-width: 640px; width: 100%; margin: 36px auto; padding: 0 20px; }

        .card {
            background-color: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 20px; padding: 36px 28px; box-shadow: 0 10px 30px rgba(11, 23, 42, 0.04);
        }

        h2 { font-size: 22px; font-weight: 900; margin-bottom: 6px; color: var(--primary); text-align: center; }
        p.subtitle { color: var(--text-muted); font-size: 13px; text-align: center; margin-bottom: 24px; }

        input[type="text"] {
            width: 100%; padding: 14px; border-radius: 10px; border: 1.5px solid var(--border-color);
            background: #ffffff; font-size: 18px; font-weight: 800; text-align: center; letter-spacing: 3px;
            text-transform: uppercase; margin-bottom: 16px; outline: none;
        }

        .btn {
            display: block; width: 100%; background-color: var(--primary); color: white;
            border: none; padding: 14px; font-size: 14px; font-weight: 800; border-radius: 10px;
            cursor: pointer; text-decoration: none; text-align: center; transition: background 0.2s;
        }
        .btn:hover { background-color: #1a273e; }

        .portal-header {
            background: #fbfbf9; border: 1px solid var(--border-color); border-radius: 14px;
            padding: 18px; text-align: center; margin-bottom: 28px;
        }

        /* Timeline Hop Container */
        .timeline-container { position: relative; padding-left: 28px; border-left: 2px dashed #d4af37; margin: 20px 0 30px 10px; }
        
        .timeline-step { position: relative; margin-bottom: 32px; }
        .timeline-step:last-child { margin-bottom: 0; }

        .timeline-node {
            position: absolute; left: -38px; top: 0; width: 20px; height: 20px;
            border-radius: 50%; background: #ffffff; border: 3px solid var(--primary); transition: all 0.3s;
        }
        .timeline-step.unlocked .timeline-node { background: #16a34a; border-color: #16a34a; box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.2); }
        .timeline-step.active .timeline-node { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.3); }

        .timeline-card {
            background: #ffffff; border: 1px solid var(--border-color); border-radius: 16px;
            padding: 20px; transition: all 0.2s;
        }
        .timeline-step.unlocked .timeline-card { border-color: #16a34a; background: #f0fdf4; }
        .timeline-step.active .timeline-card { border-color: var(--accent); background: #ffffff; box-shadow: 0 6px 20px rgba(11, 23, 42, 0.06); }

        .step-tag { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
        .unlocked .step-tag { color: #16a34a; }
        .active .step-tag { color: var(--accent); }
        .locked .step-tag { color: var(--text-muted); }

        .countdown-box {
            background: var(--accent-soft); border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 10px; padding: 12px; text-align: center; margin: 12px 0;
        }
        .countdown-digits { font-family: monospace; font-size: 22px; font-weight: 900; color: var(--primary); letter-spacing: 1px; }

        footer { text-align: center; padding: 24px; font-size: 12px; color: var(--text-muted); }
    </style>
</head>
<body>

    <header>
        <a href="/" class="logo">NightOut<span>Annapolis</span></a>
    </header>

    <main>
        <!-- INPUT VIEW (ONLY SHOWN IF NO CODE IN URL) -->
        <div id="loginCard" class="card" style="display: none;">
            <h2>Date Portal Access 🔍</h2>
            <p class="subtitle">Enter your Passcode to unlock your interactive date timeline:</p>
            <input type="text" id="codeInput" placeholder="e.g. 0826-491">
            <button class="btn" onclick="fetchItinerary()">Access Date Timeline →</button>
        </div>

        <!-- TIMELINE HOP VIEW -->
        <div id="timelineCard" class="card" style="display: none;">
            <div class="portal-header">
                <h3 id="displayNames" style="font-size: 18px; color: var(--primary); font-weight: 900; margin-bottom: 2px;">—</h3>
                <div id="displayDate" style="font-size: 13px; color: var(--text-muted); font-weight: 700;">Scheduled Date: —</div>
            </div>

            <h3 style="font-size: 16px; font-weight: 800; color: var(--primary); margin-bottom: 16px;">🗺️ Your Annapolis Experience Timeline</h3>

            <div id="timelineList" class="timeline-container"></div>

            <a href="/" class="btn" style="background: transparent; color: var(--text-muted); border: 1px solid var(--border-color); margin-top: 20px;">← Return to Main Page</a>
        </div>
    </main>

    <footer>&copy; 2026 NightOut Annapolis. Made by locals.</footer>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzK5qTseJuvbgz7uOT056mxcE2o-JESYaNkLnEhcASWbCfFkzxJ-SFBcqgxnPk8jW7-/exec";
        let activeItinerary = [];
        let scheduledDateObj = null;
        let timerInterval = null;

        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const codeParam = urlParams.get('code');
            
            if (codeParam) {
                document.getElementById('codeInput').value = codeParam;
                fetchItinerary(codeParam);
            } else {
                document.getElementById('loginCard').style.display = 'block';
            }
        });

        function fetchItinerary(codeOverride) {
            const code = codeOverride || document.getElementById('codeInput').value.trim();
            if (!code) return alert('Please enter your passcode.');

            fetch(GOOGLE_SCRIPT_URL + "?code=" + encodeURIComponent(code))
            .then(res => res.json())
            .then(data => {
                if (data.found) {
                    document.getElementById('loginCard').style.display = 'none';
                    document.getElementById('timelineCard').style.display = 'block';

                    document.getElementById('displayNames').textContent = data.names;
                    document.getElementById('displayDate').textContent = "Scheduled Date: " + data.date;

                    activeItinerary = data.itinerary || [];
                    scheduledDateObj = parseDateString(data.date);

                    renderTimeline();
                } else {
                    alert('Passcode not found. Please verify your code.');
                    document.getElementById('loginCard').style.display = 'block';
                }
            })
            .catch(err => {
                console.error(err);
                alert('Error retrieving itinerary. Please try again.');
            });
        }

        function parseDateString(dateStr) {
            if (!dateStr) return new Date();
            let parsed = new Date(dateStr);
            return isNaN(parsed.getTime()) ? new Date() : parsed;
        }

        function parseStepTargetTime(timeStr, baseDate) {
            let target = new Date(baseDate);
            if (!timeStr) return target;

            let isPM = timeStr.toUpperCase().includes("PM");
            let isAM = timeStr.toUpperCase().includes("AM");
            let clean = timeStr.replace(/AM|PM/gi, '').trim();
            let parts = clean.split(":");

            let hrs = parseInt(parts[0], 10) || 0;
            let mins = parseInt(parts[1], 10) || 0;

            if (isPM && hrs < 12) hrs += 12;
            if (isAM && hrs === 12) hrs = 0;

            target.setHours(hrs, mins, 0, 0);
            return target;
        }

        function renderTimeline() {
            const container = document.getElementById('timelineList');
            container.innerHTML = "";
            if (timerInterval) clearInterval(timerInterval);

            if (activeItinerary.length === 0) {
                container.innerHTML = "<div style='color: var(--text-muted); font-size: 13px;'>Your itinerary stops are currently being assembled by our concierge team. Check back closer to date night!</div>";
                return;
            }

            const now = new Date();

            activeItinerary.forEach((step, idx) => {
                const targetTime = parseStepTargetTime(step.time, scheduledDateObj);
                const isTimeReached = now >= targetTime;

                const stepDiv = document.createElement('div');
                stepDiv.className = `timeline-step ${isTimeReached ? 'unlocked' : (idx === 0 || now < targetTime ? 'active' : 'locked')}`;

                if (isTimeReached) {
                    stepDiv.innerHTML = `
                        <div class="timeline-node"></div>
                        <div class="timeline-card">
                            <div class="step-tag">UNLOCKED STOP #${idx + 1} • ${step.time}</div>
                            <div style="font-size: 16px; font-weight: 800; color: var(--primary); margin: 2px 0;">🔓 ${step.title}</div>
                            <div style="font-size: 13px; font-weight: 700; color: var(--accent); margin-bottom: 6px;">📍 ${step.location}</div>
                            <div style="font-size: 13px; color: var(--text-muted); line-height: 1.5;">${step.details}</div>
                        </div>
                    `;
                } else {
                    stepDiv.innerHTML = `
                        <div class="timeline-node"></div>
                        <div class="timeline-card">
                            <div class="step-tag">TIME-LOCKED STOP #${idx + 1}</div>
                            <div style="font-size: 15px; font-weight: 800; color: var(--primary); margin: 2px 0;">🔒 Scheduled for ${step.time}</div>
                            
                            <div class="countdown-box">
                                <div style="font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase;">Unlocks In</div>
                                <div class="countdown-digits" id="timer-${idx}">00d 00h 00m 00s</div>
                            </div>

                            <div style="font-size: 11px; color: var(--text-muted);">Destination & reservation details unlock automatically when scheduled.</div>
                            <button style="background: transparent; border: 1px solid var(--border-color); padding: 6px 12px; font-size: 11px; font-weight: 700; border-radius: 6px; cursor: pointer; margin-top: 10px; color: var(--primary);" onclick="forceUnlock(${idx})">⚡ Force Unlock Early</button>
                        </div>
                    `;
                }

                container.appendChild(stepDiv);
            });

            startMultiCountdowns();
        }

        function forceUnlock(idx) {
            const stepDivs = document.querySelectorAll('.timeline-step');
            if (stepDivs[idx]) {
                const step = activeItinerary[idx];
                stepDivs[idx].className = "timeline-step unlocked";
                stepDivs[idx].querySelector('.timeline-card').innerHTML = `
                    <div class="step-tag">UNLOCKED EARLY STOP #${idx + 1}</div>
                    <div style="font-size: 16px; font-weight: 800; color: var(--primary); margin: 2px 0;">🔓 ${step.title}</div>
                    <div style="font-size: 13px; font-weight: 700; color: var(--accent); margin-bottom: 6px;">📍 ${step.location}</div>
                    <div style="font-size: 13px; color: var(--text-muted); line-height: 1.5;">${step.details}</div>
                `;
            }
        }

        function startMultiCountdowns() {
            function updateClocks() {
                const now = new Date();

                activeItinerary.forEach((step, idx) => {
                    const timerElem = document.getElementById(`timer-${idx}`);
                    if (timerElem) {
                        const targetTime = parseStepTargetTime(step.time, scheduledDateObj);
                        const diffMs = targetTime - now;

                        if (diffMs <= 0) {
                            renderTimeline();
                        } else {
                            const days = Math.floor(diffMs / (1000 * 60 * 60 * 24));
                            const hours = Math.floor((diffMs % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                            const mins = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
                            const secs = Math.floor((diffMs % (1000 * 60)) / 1000);

                            const formattedSecs = secs < 10 ? "0" + secs : secs;
                            const formattedMins = mins < 10 ? "0" + mins : mins;

                            if (days > 0) {
                                timerElem.textContent = `${days}d ${hours}h ${formattedMins}m ${formattedSecs}s`;
                            } else {
                                const formattedHours = hours < 10 ? "0" + hours : hours;
                                timerElem.textContent = `${formattedHours}h ${formattedMins}m ${formattedSecs}s`;
                            }
                        }
                    }
                });
            }

            updateClocks();
            timerInterval = setInterval(updateClocks, 1000);
        }
    </script>
</body>
</html>
